spec:
  description: deeplab pytorch prediction
  runtime: 'python:3.6'
  handler: main:handler
  eventTimeout: 30s
  env:
    - name: PYTHONPATH
      value: /opt/nuclio/fbrs

  build:
    image: cvat/mmseg:latest
    baseImage: python:3.6.11

    directives:
      preCopy:
        - kind: WORKDIR
          value: /opt/nuclio
        - kind: RUN
          value: pip3 install torch==1.5.0+cu101 torchvision==0.6.0+cu101 -f https://download.pytorch.org/whl/torch_stable.html && pip install mmcv-full==latest+torch1.5.0+cu101 -f https://download.openmmlab.com/mmcv/dist/index.html
        - kind: RUN
          value: git clone https://github.com/open-mmlab/mmsegmentation.git /mmsegmentation && cd /mmsegmentation && pip install -e ./
        # - kind: RUN
        #   value: git clone https://github.com/saic-vul/fbrs_interactive_segmentation.git fbrs
        # - kind: WORKDIR
        #   value: /opt/nuclio/fbrs
        # - kind: ENV
        #   value: fileid=1Z9dQtpWVTobEdmUBntpUU0pJl-pEXUwR
        # - kind: ENV/
        #   value: filename=resnet101_dh256_sbd.pth
        # - kind: RUN
        #   value: curl -c ./cookie -s -L "https://drive.google.com/uc?export=download&id=${fileid}"
        # - kind: RUN
        #   value: curl -Lb ./cookie "https://drive.google.com/uc?export=download&confirm=`awk '/download/ {print $NF}' ./cookie`&id=${fileid}" -o ${filename}
        - kind: RUN
          value: apt update && apt install -y libgl1-mesa-glx vim
        - kind: RUN
          value: pip install git+https://github.com/anhvth/avcv.git    
        - kind: RUN
          value: pip install scikit-image && pip install git+https://github.com/cocodataset/panopticapi.git
        # - kind: RUN
          # value: wget "https://download.openmmlab.com/mmsegmentation/v0.5/ocrnet/ocrnet_hr48_512x1024_160k_cityscapes/ocrnet_hr48_512x1024_160k_cityscapes_20200602_191037-dfbf1b0c.pth" -O /ckpt.pth
        # - kind: RUN
        #   value: pip3 install -r requirements.txt
        - kind: WORKDIR
          value: /opt/nuclio
        - kind: RUN
          value: mkdir -p /root/.cache/torch/hub/checkpoints/ &&  wget "https://download.pytorch.org/models/resnet101-5d3b4d8f.pth" -O "/root/.cache/torch/hub/checkpoints/resnet101-5d3b4d8f.pth" 
        - kind: RUN
          value: wget "https://dl.fbaipublicfiles.com/detr/detr-r101-panoptic-40021d53.pth" -O /root/.cache/torch/hub/checkpoints/detr-r101-panoptic-40021d53.pth
  triggers:
    myHttpTrigger:
      maxWorkers: 2
      kind: 'http'
      workerAvailabilityTimeoutMilliseconds: 10000
      attributes:
        maxRequestBodySize: 33554432 # 32MB

  platform:
    attributes:
      restartPolicy:
        name: always
        maximumRetryCount: 3
      mountMode: volume
